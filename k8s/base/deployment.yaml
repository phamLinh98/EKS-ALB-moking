apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-node-app
  labels:
    app: my-node-app
    version: "6.0"
spec:
  replicas: 2
  progressDeadlineSeconds: 60    # 60s không progress → mark Failed
  revisionHistoryLimit: 5        # giữ 5 revision để rollback
  selector:
    matchLabels:
      app: my-node-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                # tạo tối đa 1 pod mới cùng lúc
      maxUnavailable: 0          # KHÔNG cho pod nào down trong lúc update
  template:
    metadata:
      labels:
        app: my-node-app
        version: "6.0"
    spec:
      containers:
        - name: my-node-app
          image: my-node-app:6.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"

          # Cho app 60s để khởi động trước khi check
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            failureThreshold: 6    # 6 * 10s = 60s để startup
            periodSeconds: 10

          # Chỉ route traffic khi app thực sự ready
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3    # fail 3 lần → Unready → không nhận traffic

          # Restart nếu app bị treo
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3    # fail 3 lần → restart pod

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"