apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-node-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<YOUR_USERNAME>/<YOUR_REPO>  # ← thay vào đây
    targetRevision: HEAD
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true        # tự xóa resource không còn trong Git
      selfHeal: true     # tự fix nếu ai sửa tay trên cluster
    syncOptions:
      - CreateNamespace=true
